version: 1
disable_existing_loggers: False
formatters:
  simple:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

handlers:
  rich:
      class: kedro.logging.RichHandler
      rich_tracebacks: True
      level: INFO
      rich_tracebacks: true
      formatter: simple
      markup: True

  console:
      class: logging.StreamHandler
      level: INFO
      formatter: simple
      stream: ext://sys.stdout

  info_file_handler:
      class: logging.handlers.RotatingFileHandler
      level: INFO
      formatter: simple
      filename: logs/info.log
      maxBytes: 10485760 # 10MB
      backupCount: 20
      encoding: utf8
      delay: True

  error_file_handler:
      class: logging.handlers.RotatingFileHandler
      level: ERROR
      formatter: simple
      filename: logs/errors.log
      maxBytes: 10485760 # 10MB
      backupCount: 20
      encoding: utf8
      delay: True

loggers:
  kedro:
    level: INFO
    handlers: [rich, info_file_handler, error_file_handler]
    propagate: no

  ai_core:
    level: INFO
    handlers: [rich, info_file_handler, error_file_handler]
    propagate: no

root:
  level: INFO
  handlers: [rich, info_file_handler, error_file_handler]
