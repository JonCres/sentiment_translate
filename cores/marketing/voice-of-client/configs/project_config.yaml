alerts:
  conditions:
    on_failure: true
    on_retry: false
    on_success: false
  email:
    enabled: false
    from_address: ml-team@company.com
    smtp_port: 587
    smtp_server: ${SMTP_SERVER}
    to_addresses:
    - ml-team@company.com
  enabled: true
  slack:
    channel: '#ml-alerts'
    enabled: false
    webhook_url: ${SLACK_WEBHOOK}
deployments:
  ai_pipeline:
    description: 'AI Pipeline: Sentiment Analysis and Topic Modeling using Kedro'
    entrypoint: src/prefect_orchestration/ai_pipeline.py:run_pipeline
    name: voice-of-customer-ai
    parameters: {}
    schedule:
      cron: null
      enabled: false
      timezone: America/New_York
    tags:
    - ai-pipeline
    - kedro
    - voice-of-customer
    - ml
    - sentiment-analysis
    - topic-modeling
    version: 1.0.0
  data_pipeline:
    description: 'Data Pipeline: Extract, Validate, Clean, Feature Engineering using
      Kedro'
    entrypoint: src/prefect_orchestration/data_pipeline.py:run_pipeline
    name: voice-of-customer-data
    parameters: {}
    schedule:
      cron: null
      enabled: false
      timezone: America/New_York
    tags:
    - data-pipeline
    - kedro
    - voice-of-customer
    - etl
    version: 1.0.0
  master_pipeline:
    description: 'Master Pipeline: Orchestrates Data, AI, Visualization, and Monitoring
      using Kedro'
    entrypoint: src/prefect_orchestration/run_all_pipelines.py:run_complete_pipeline
    name: aicore-master
    parameters: {}
    schedule:
      cron: null
      enabled: false
      timezone: America/New_York
    tags:
    - master-pipeline
    - kedro
    - aicore
    - orchestration
    version: 1.0.0
  monitoring_pipeline:
    description: 'Monitoring Pipeline: Drift Detection and Performance Checks using
      Kedro'
    entrypoint: src/prefect_orchestration/monitoring_pipeline.py:run_pipeline
    name: voice-of-customer-monitoring
    parameters: {}
    schedule:
      cron: 0 */4 * * *
      enabled: true
      timezone: America/New_York
    tags:
    - monitoring-pipeline
    - kedro
    - voice-of-customer
    - monitoring
    - drift-detection
    version: 1.0.0
  visualization_pipeline:
    description: 'Visualization Pipeline: Generate charts and dashboards using Kedro'
    entrypoint: src/prefect_orchestration/visualization_pipeline.py:run_pipeline
    name: voice-of-customer-visualization
    parameters: {}
    schedule:
      cron: null
      enabled: false
      timezone: America/New_York
    tags:
    - visualization-pipeline
    - kedro
    - voice-of-customer
    - viz
    - reporting
    version: 1.0.0
execution:
  concurrency:
    max_concurrent_flows: 5
    max_concurrent_tasks: 10
  retry:
    exponential_backoff: true
    max_retries: 2
    retry_delay_seconds: 60
  timeout:
    flow_timeout_seconds: 3600
    task_timeout_seconds: 1800
general:
  environment: development
  log_level: INFO
  project_path: .
logging:
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  forward_kedro_logs: true
  kedro_log_level: INFO
  level: INFO
  log_directory: logs/prefect
  persist_logs: true
prefect:
  server:
    api_url: http://127.0.0.1:4200/api
    ui_url: http://127.0.0.1:4200
  storage:
    path: .
    type: local
  work_pool:
    concurrency_limit: 10
    name: aicore-pool
    type: process
project:
  description: Description of the AI Core
  industry: industry_name
  name: voice-of-client
  use_case: Description of the use case
  version: 1.0.0
