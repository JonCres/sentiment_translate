# Data Catalog
# Define your datasets here

raw_data:
  type: polars.CSVDataset
  filepath: data/01_raw/online_retail_II.csv
  load_args:
    separator: ","
    encoding: "utf-8"
    try_parse_dates: true
    infer_schema_length: 10000

raw_subscriptions:
  type: polars.CSVDataset
  filepath: data/01_raw/subscriptions.csv
  load_args:
    ignore_errors: true

raw_engagement:
  type: polars.CSVDataset
  filepath: data/01_raw/engagement_fact_table.csv
  load_args:
    ignore_errors: true

raw_interactions:
  type: polars.CSVDataset
  filepath: data/01_raw/interactions.csv
  load_args:
    ignore_errors: true

raw_qoe:
  type: polars.CSVDataset
  filepath: data/01_raw/qoe_metrics.csv
  load_args:
    ignore_errors: true

raw_advertising:
  type: polars.CSVDataset
  filepath: data/01_raw/advertising_logs.csv
  load_args:
    ignore_errors: true

raw_tvod:
  type: polars.CSVDataset
  filepath: data/01_raw/tvod_transactions.csv
  load_args:
    ignore_errors: true

transactions_skeleton:
  type: ai_core.datasets.polars_delta_dataset.PolarsDeltaDataset
