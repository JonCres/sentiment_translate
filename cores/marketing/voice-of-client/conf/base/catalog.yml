# Data Catalog for Voice of the Client (Marketing)

# ==========================================
# 1. RAW DATA LAYER (Bronze)
# ==========================================
raw_feedback:
  type: pandas.CSVDataset
  filepath: data/01_raw/client_feedback.csv

# ==========================================
# 2. INTERMEDIATE LAYER (Silver)
# ==========================================
clean_feedback:
  type: ai_core.datasets.polars_delta_dataset.PolarsDeltaDataset
  filepath: data/02_intermediate/clean_feedback.delta
  file_format: delta
  save_args:
    mode: overwrite
    delta_write_options:
      schema_mode: overwrite
  load_args:
    to_pandas: true

# ==========================================
# 3. PRIMARY LAYER (Gold)
# ==========================================
# Standardized features including sentiment and emotion vectors
feedback_features:
  type: ai_core.datasets.polars_delta_dataset.PolarsDeltaDataset
