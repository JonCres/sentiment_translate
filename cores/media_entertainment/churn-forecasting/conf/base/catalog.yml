# Data Catalog
# Define your datasets here

raw_data:
  type: polars.CSVDataset
  filepath: data/01_raw/online_retail_II.csv
  load_args:
    separator: ","
    encoding: "utf-8"
    try_parse_dates: true
    infer_schema_length: 10000

raw_qoe:
  type: polars.CSVDataset
  filepath: data/01_raw/qoe_telemetry.csv
  load_args:
    ignore_errors: true

raw_social_graph:
  type: polars.CSVDataset
  filepath: data/01_raw/social_connections.csv
  load_args:
    ignore_errors: true

raw_subscriptions:
